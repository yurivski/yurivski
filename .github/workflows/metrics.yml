name: Metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: production
    steps:

      - name: General Stats
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.metrics_token }}
          user: yurivski
          template: classic
          filename: metrics/github-metrics.svg
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: America/Sao_Paulo
          config_display: large
          config_padding: 0, 8 + 11%
          extras_css: |
            * { color: #e6edf3 !important; }
            h2.field { color: #ffffff !important; }
            svg { background-color: #0d1117 !important; }
            .field .value { color: #58a6ff !important; }
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_sections: base

      - name: Languages
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.metrics_token }}
          user: yurivski
          template: classic
          filename: metrics/github-metrics-languages.svg
          base: ""
          config_timezone: America/Sao_Paulo
          config_display: large
          config_padding: 0, 8 + 6%
          extras_css: |
            * { color: #e6edf3 !important; }
            svg { background-color: #0d1117 !important; }
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming, data
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage, lines

      - name: Coding Habits
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.metrics_token }}
          user: yurivski
          template: classic
          filename: metrics/github-metrics-habits.svg
          base: ""
          config_timezone: America/Sao_Paulo
          config_display: large
          config_padding: 0, 8 + 6%
          extras_css: |
            * { color: #e6edf3 !important; }
            svg { background-color: #0d1117 !important; }
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_charts: yes

      - name: Recent Activity
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.metrics_token }}
          user: yurivski
          template: classic
          filename: metrics/github-metrics-activity.svg
          base: ""
          config_timezone: America/Sao_Paulo
          config_display: large
          config_padding: 0, 8 + 6%
          extras_css: |
            * { color: #e6edf3 !important; }
            svg { background-color: #0d1117 !important; }
            a { color: #58a6ff !important; }
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_visibility: public

      - name: Full Year Calendar
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.metrics_token }}
          user: yurivski
          template: classic
          filename: metrics/github-metrics-calendar.svg
          base: ""
          config_timezone: America/Sao_Paulo
          config_display: large
          config_padding: 0, 8 + 6%
          extras_css: |
            * { color: #e6edf3 !important; }
            svg { background-color: #0d1117 !important; }
          plugin_calendar: yes
          plugin_calendar_limit: 1

      - name: Follow-up Issues & PRs
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.metrics_token }}
          user: yurivski
          template: classic
          filename: metrics/github-metrics-followup.svg
          base: ""
          config_timezone: America/Sao_Paulo
          config_display: large
          config_padding: 0, 8 + 6%
          extras_css: |
            * { color: #e6edf3 !important; }
            svg { background-color: #0d1117 !important; }
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes

      - name: Achievements
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.metrics_token }}
          user: yurivski
          template: classic
          filename: metrics/github-metrics-achievements.svg
          base: ""
          config_timezone: America/Sao_Paulo
          config_display: large
          config_padding: 0, 8 + 6%
          extras_css: |
            * { color: #e6edf3 !important; }
            svg { background-color: #0d1117 !important; }
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: yurivski
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#58a6ff

      - name: Push Snake SVG
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}